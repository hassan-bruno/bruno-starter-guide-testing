info:
  name: 02-echo-bru
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseURL}}"
  body:
    type: json
    data: |-
      {
        "title": "Bruno",
        "msg": "Loved by developers. Built for developers."
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("body has title", function () {
          expect(res.getBody()).to.have.property("title");
          });

        test("200 status code", function () {
          expect(res.getStatus()).to.eql(200);
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.title
      operator: eq
      value: Bruno

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
